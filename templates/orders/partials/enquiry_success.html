<!-- Enquiry Success -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center">
        <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
            <i data-lucide="check-circle" class="w-8 h-8 text-green-600"></i>
        </div>
        
        <h2 class="text-xl font-serif font-bold mb-2">Message Sent!</h2>
        <p class="text-gray-600 mb-6">Thank you for reaching out. We'll get back to you within 24 hours.</p>
        
        <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
            <p class="text-sm text-gray-600 mb-1">Reference ID</p>
            <p class="font-mono text-gold">{{ enquiry.id }}</p>
        </div>
        
        <div class="flex gap-3">
            <a href="https://wa.me/{{ BUSINESS_WHATSAPP|slice:'1:' }}" target="_blank"
               class="flex-1 py-2.5 border border-green-600 text-green-600 rounded-lg font-medium text-sm hover:bg-green-50 flex items-center justify-center gap-2">
                <i data-lucide="message-circle" class="w-4 h-4"></i>
                WhatsApp
            </a>
            <a href="{% url 'products:list' %}" class="flex-1 btn-primary py-2.5 rounded-lg text-sm">
                Continue Shopping
            </a>
        </div>
    </div>
</div>

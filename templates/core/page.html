{% extends 'base.html' %}

{% block title %}{{ page.title }} | {{ BUSINESS_NAME }}{% endblock %}
{% block description %}{{ page.meta_description }}{% endblock %}

{% block content %}
<div class="pt-24 pb-16 bg-brand-cream min-h-screen">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-2xl p-8 md:p-12">
            <h1 class="text-3xl md:text-4xl font-serif font-bold text-charcoal mb-8">{{ page.title }}</h1>
            <div class="prose prose-lg max-w-none">
                {{ page.content|safe }}
            </div>
        </div>
    </div>
</div>
{% endblock %}

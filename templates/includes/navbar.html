<!-- Navbar - Compact -->
<header id="navbar" class="fixed top-0 left-0 right-0 z-40 bg-brand-cream/95 backdrop-blur-md border-b border-gray-100 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex items-center justify-between h-14">
            <!-- Logo -->
            <a href="{% url 'core:home' %}" class="flex items-center gap-2">
                {% if site_settings.site_logo %}
                <img src="{{ site_settings.site_logo.url }}" alt="{{ BUSINESS_NAME }}" class="h-8 w-auto">
                {% else %}
                <span class="text-lg font-serif font-bold text-brand-charcoal">{{ BUSINESS_NAME }}</span>
                {% endif %}
            </a>
            
            <!-- Desktop Nav -->
            <nav class="hidden md:flex items-center gap-6">
                <a href="{% url 'products:list' %}" class="text-sm text-gray-600 hover:text-brand-charcoal transition-colors">Shop</a>
                <a href="{% url 'orders:track' %}" class="text-sm text-gray-600 hover:text-brand-charcoal transition-colors">Track Order</a>
                <a href="{% url 'orders:enquiry' %}" class="text-sm text-gray-600 hover:text-brand-charcoal transition-colors">Contact</a>
            </nav>
            
            <!-- Right -->
            <div class="flex items-center gap-3">
                <!-- Search -->
                <form action="{% url 'core:search' %}" method="get" class="hidden sm:block">
                    <input type="text" name="q" placeholder="Search..." 
                           class="w-32 lg:w-40 px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg input-focus">
                </form>
                
                <!-- Cart -->
                <button onclick="openCart()" class="relative p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    {% if cart_count > 0 %}
                    <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-gold text-brand-charcoal text-[10px] font-bold rounded-full flex items-center justify-center">
                        {{ cart_count }}
                    </span>
                    {% endif %}
                </button>
                
                <!-- WhatsApp -->
                <a href="https://wa.me/{{ BUSINESS_WHATSAPP|slice:'1:' }}" target="_blank" 
                   class="hidden sm:flex items-center gap-1 px-3 py-1.5 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 transition-colors">
                    <i data-lucide="message-circle" class="w-4 h-4"></i>
                    <span class="hidden lg:inline">Chat</span>
                </a>
                
                <!-- Mobile Menu -->
                <button onclick="toggleMenu()" class="md:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Cart Sidebar -->
<div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between p-6 border-b border-gray-100">
        <h3 class="font-serif text-2xl text-brand-dark">Your Cart</h3>
        <button onclick="closeCart()" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Cart Body (items + summary, replaced by HTMX) -->
    <div id="cart-content" class="flex-1 flex flex-col overflow-hidden">
        {% include 'cart/partials/cart_sidebar.html' %}
    </div>
</div>

<!-- Overlay -->
<div id="cart-overlay" onclick="closeCart()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

<script>
function getCSRFToken() {
    return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
}

function updateCartItem(itemId, quantity) {
    if (quantity < 1) {
        removeCartItem(itemId);
        return;
    }
    const formData = new FormData();
    formData.append('quantity', quantity);
    fetch(`/cart/item/${itemId}/update/`, {
        method: 'POST',
        headers: {'X-CSRFToken': getCSRFToken()},
        body: formData
    }).then(() => location.reload());
}

function removeCartItem(itemId) {
    fetch(`/cart/item/${itemId}/remove/`, {
        method: 'POST',
        headers: {'X-CSRFToken': getCSRFToken()}
    }).then(() => location.reload());
}
</script>

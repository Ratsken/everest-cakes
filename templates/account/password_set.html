{% extends 'account/base_manage.html' %}

{% block title %}Set Password | {{ BUSINESS_NAME }}{% endblock %}

{% block auth_manage_content %}
<h1 class="text-3xl font-serif font-bold text-brand-dark mb-2">Set Password</h1>
<p class="text-sm text-gray-600 mb-6">Set a password for your account.</p>
<form method="post" action="{% url 'account_set_password' %}" class="space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium mb-1 text-brand-dark">New Password</label>
        <input type="password" name="password1" required class="w-full px-4 py-2.5 rounded-lg border border-gold/30 bg-white input-focus">
    </div>
    <div>
        <label class="block text-sm font-medium mb-1 text-brand-dark">Confirm Password</label>
        <input type="password" name="password2" required class="w-full px-4 py-2.5 rounded-lg border border-gold/30 bg-white input-focus">
    </div>
    <button type="submit" class="w-full sm:w-auto px-5 py-2.5 rounded-lg btn-primary font-medium">Set Password</button>
</form>
{% endblock %}

{% extends 'account/base_entrance.html' %}

{% block title %}Login | {{ BUSINESS_NAME }}{% endblock %}

{% block auth_content %}
<h1 class="text-3xl font-serif font-bold text-brand-dark mb-2">Login</h1>
<p class="text-sm text-gray-600 mb-6">Access your account to manage orders.</p>

<form method="post" action="{% url 'account_login' %}" class="space-y-4">
    {% csrf_token %}
    {{ redirect_field }}
    <div>
        <label class="block text-sm font-medium mb-1 text-brand-dark">Email</label>
        <input type="email" name="login" required class="w-full px-4 py-2.5 rounded-lg border border-gold/30 bg-white input-focus">
    </div>
    <div>
        <label class="block text-sm font-medium mb-1 text-brand-dark">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-2.5 rounded-lg border border-gold/30 bg-white input-focus">
    </div>
    <button type="submit" class="w-full py-2.5 rounded-lg btn-primary font-medium">Login</button>
</form>

<div class="mt-5 text-sm text-center space-y-2">
    <a href="{% url 'account_reset_password' %}" class="text-brand-accent hover:text-gold">Forgot password?</a>
    <p class="text-gray-600">No account? <a href="{% url 'account_signup' %}" class="text-brand-accent hover:text-gold">Register</a></p>
</div>
{% endblock %}

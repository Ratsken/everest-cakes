{% extends 'account/base_entrance.html' %}

{% block title %}Set New Password | {{ BUSINESS_NAME }}{% endblock %}

{% block auth_content %}
<h1 class="text-3xl font-serif font-bold text-brand-dark mb-2">Set New Password</h1>
<p class="text-sm text-gray-600 mb-6">Choose a strong new password.</p>
<form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium mb-1 text-brand-dark">New Password</label>
        <input type="password" name="password1" required class="w-full px-4 py-2.5 rounded-lg border border-gold/30 bg-white input-focus">
    </div>
    <div>
        <label class="block text-sm font-medium mb-1 text-brand-dark">Confirm Password</label>
        <input type="password" name="password2" required class="w-full px-4 py-2.5 rounded-lg border border-gold/30 bg-white input-focus">
    </div>
    <button type="submit" class="w-full py-2.5 rounded-lg btn-primary font-medium">Update Password</button>
</form>
{% endblock %}

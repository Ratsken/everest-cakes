{% extends 'base.html' %}

{% block content %}
<section class="pt-36 md:pt-40 pb-16 bg-brand-cream min-h-screen">
    <div class="max-w-md mx-auto px-4 sm:px-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gold/20 p-6 sm:p-8">
            {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                <div class="text-sm rounded-lg px-3 py-2 {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% block auth_content %}{% endblock %}
        </div>
    </div>
</section>
{% endblock %}

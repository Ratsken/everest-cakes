{% extends 'account/base_entrance.html' %}

{% block title %}Reset Password | {{ BUSINESS_NAME }}{% endblock %}

{% block auth_content %}
<h1 class="text-3xl font-serif font-bold text-brand-dark mb-2">Reset Password</h1>
<p class="text-sm text-gray-600 mb-6">Enter your email and we’ll send reset instructions.</p>
<form method="post" action="{% url 'account_reset_password' %}" class="space-y-4">
    {% csrf_token %}
    <input type="email" name="email" required class="w-full px-4 py-2.5 rounded-lg border border-gold/30 bg-white input-focus" placeholder="you@example.com">
    <button type="submit" class="w-full py-2.5 rounded-lg btn-primary font-medium">Send Reset Link</button>
</form>
{% endblock %}
